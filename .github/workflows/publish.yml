name: publish

on:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  check-version:
    name: "Check version bump"
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: check
        run: |
          NEW_VERSION=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — will publish version ${NEW_VERSION}"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OLD_VERSION=$(git show HEAD~1:pyproject.toml 2>/dev/null \
            | grep -E '^version\s*=' | head -1 | sed 's/.*"\(.*\)".*/\1/' || true)

          echo "Previous version: ${OLD_VERSION:-<none>}"
          echo "Current version:  ${NEW_VERSION}"

          if [ -n "$NEW_VERSION" ] && [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "Version bumped — will publish"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged — skip publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: "Build and upload wheels"
    runs-on: ubuntu-latest
    needs: [check-version]
    if: needs.check-version.outputs.should_publish == 'true'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build client
        run: |
          cd client
          npm install
          npm run build
          cd ..

      - name: Move client dist to package
        run: |
          mkdir -p small_websocket_prebuilt/client
          cp -r client/dist small_websocket_prebuilt/client/

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install development dependencies
        run: uv sync --group dev

      - name: Build project
        run: uv build

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: ./dist

  publish-to-pypi:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: needs.check-version.outputs.should_publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/small-websocket-prebuilt
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: ./dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
